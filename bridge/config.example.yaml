server:
  host: "127.0.0.1"
  port: 8787

device:
  transport: "serial" # serial | wifi

serial:
  mode: "real"
  port: "/dev/stackchan"
  baud_rate: 115200
  timeout_ms: 3000
  reconnect:
    enabled: true
    interval_ms: 2000

wifi:
  base_url: "http://192.168.0.123"
  token: ""
  timeout_ms: 5000
  health_check_interval_ms: 5000

stt:
  transcribe_url: "http://<speech-services-lan-ip>:8790/transcribe"

events:
  include_bridge_events: true

safety:
  min_x: -300
  max_x: 300
  min_y: 0
  max_y: 450

logging:
  level: "info"
