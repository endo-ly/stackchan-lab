server:
  host: "127.0.0.1"
  port: 8787

device:
  transport: "serial" # serial | wifi

serial:
  mode: "real"
  port: "/dev/stackchan"
  baud_rate: 115200
  timeout_ms: 3000
  reconnect:
    enabled: true
    interval_ms: 2000

wifi:
  base_url: "http://192.168.0.123"
  token: ""
  timeout_ms: 5000
  health_check_interval_ms: 5000

voice_gateway:
  base_url: "http://192.168.0.210:8012"
  timeout_ms: 120000

agent_runtime:
  endpoint: "http://127.0.0.1:10961/api/voice/turn"
  auth_token: ""
  agent_id: "default"
  surface: "stackchan"
  session_key: "main"
  user_id: "local-speaker"
  timeout_ms: 120000

stt:
  model: "stt-default"

tts:
  model: "aivis-default"
  voice: "your-voice-name"
  response_format: "wav"

wake:
  auto_start: false
  record_duration_ms: 5000

spoken_reply:
  enabled: false
  listen_sources:
    - "stackchan-wake"
  cooldown_ms: 800
  busy_policy: "ignore"

events:
  include_bridge_events: true

safety:
  min_x: -300
  max_x: 300
  min_y: 0
  max_y: 450

logging:
  level: "info"
